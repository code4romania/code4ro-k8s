fullnameOverride: "vm-stack"

kube-state-metrics:
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[app.kubernetes.io/name,app.kubernetes.io/component,app.kubernetes.io/instance]

vmsingle:
  spec:
    retentionPeriod: "1"
    extraArgs:
      maxLabelsPerTimeseries: "40"
    resources:
      requests:
        cpu: 150m
        memory: 1Gi
      limits:
        memory: 2Gi

vmagent:
  spec:
    resources:
      requests:
        cpu: 60m
        memory: 130M
      limits:
        memory: 400M

prometheus-node-exporter:
  tolerations:
    - effect: NoExecute
      key: CriticalAddonsOnly
      operator: Exists

kubeControllerManager:
  enabled: false
coreDns:
  enabled: false
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
alertmanager:
  spec:
    configSecret: "alertmanager-config"

defaultRules:
  groups:
    general:
      create: false

defaultDashboards:
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true

# Two deviations from the chart defaults here, both needed to keep Grafana 13 starting up:
#
# 1. The chart also provisions a "VictoriaMetrics (DS)" datasource of type
#    victoriametrics-metrics-datasource. We don't install that plugin, so it is dropped.
#
# 2. No `uid` on these datasources. Grafana provisioning looks a datasource up by name, then
#    re-queries by (id AND uid AND org_id) inside UpdateDataSource. Our rows predate the chart
#    setting explicit uids, so they carry auto-generated ones (the VictoriaMetrics row is
#    `P4169E866C3094E38`, which is what infra/victoria-metrics/dashboards/cluster-view.yaml
#    references). A uid here that disagrees with the stored one makes that lookup miss and kills
#    startup. Omitting it matches on id alone and preserves whatever uid is already stored.
#    Note: on a from-scratch install these datasources would get random uids instead.
defaultDatasources:
  victoriametrics:
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        isDefault: true
  alertmanager:
    datasources:
      - name: Alertmanager
        access: proxy
        jsonData:
          implementation: prometheus

grafana:
  sidecar:
    dashboards:
      searchNamespace: ALL
    resources:
      requests:
        memory: 100Mi
      limits:
        memory: 150Mi
  # Version-pinned on purpose: Grafana's preinstall skips a plugin that is already present on the
  # PVC, so an unpinned entry keeps loading whatever stale build was installed months ago.
  plugins:
    - victoriametrics-logs-datasource@0.30.1
  # The Grafana PVC is RWO, so the chart's default RollingUpdate surges a second pod that either
  # hits Multi-Attach or ends up sharing one SQLite DB with the outgoing pod.
  deploymentStrategy:
    type: Recreate
  vmScrape:
    enabled: false
  admin:
    existingSecret: grafana-secret
  envFromSecret: grafana-secret
  persistence:
    enabled: true
  resources:
    requests:
      memory: 384Mi
    limits:
      memory: 512Mi
  ingress:
    enabled: true
    ingressClassName: tailscale
    hosts:
      - grafana
    tls:
      - hosts:
          - grafana
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: victoria-logs
          type: victoriametrics-logs-datasource
          orgId: 1
          url: http://victoria-logs-victoria-logs-single-server.victoria-logs.svc.cluster.local:9428
          access: proxy

  grafana.ini:
    server:
      domain: grafana.serval-mark.ts.net
      root_url: https://grafana.serval-mark.ts.net
    users:
      allow_sign_up: false
      allow_org_create: false
    log:
      mode: console
      # `error` suppresses the provisioning lines that name which datasource failed.
      level: info
      # Temporary: per-logger debug to identify which datasource fails provisioning.
      filters: datasources:debug,datasources-retriever:debug,provisioning.datasources:debug
    auth.google:
      enabled: true
      client_id: 578670592407-0r9vnq4l6r6ck8jpo1gthohfq520rgt7.apps.googleusercontent.com
      client_secret: ${google-client-secret}
      allowed_domains: code4.ro commitglobal.org

  alerting:
    contactpoints.yaml:
      apiVersion: 1
      contactPoints:
        - orgId: 1
          name: Code4Ro Slack
          receivers:
            - uid: XTCAjgR4z
              type: slack
              settings:
                url: ${slack-webhook}
