name: "terrakube"

security:
  useOpenLDAP: false
  adminGroup: "commitglobal:terraform"
  patSecret: "placeholder-overridden-by-secret"
  internalSecret: "placeholder-overridden-by-secret"
  dexClientId: "terrakube"
  dexClientScope: "email openid profile offline_access groups"
  dexIssuerUri: "https://terrakube-api.serval-mark.ts.net/dex"

dex:
  config:
    issuer: https://terrakube-api.serval-mark.ts.net/dex
    storage:
      type: memory
    web:
      http: 0.0.0.0:5556
      allowedOrigins: ['*']
    oauth2:
      responseTypes: ["code", "token", "id_token"]
      skipApprovalScreen: true

    staticClients:
      - id: terrakube
        redirectURIs:
          - 'https://terrakube.serval-mark.ts.net'
          - '/device/callback'
          - 'http://localhost:10000/login'
          - 'http://localhost:10001/login'
        name: 'terrakube'
        public: true

    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $GITHUB_CLIENT_ID
          clientSecret: $GITHUB_CLIENT_SECRET
          redirectURI: "https://terrakube-api.serval-mark.ts.net/dex/callback"
          orgs:
            - name: code4romania

  envVars:
    - name: GITHUB_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: terrakube-credentials
          key: GITHUB_CLIENT_ID
    - name: GITHUB_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: terrakube-credentials
          key: GITHUB_CLIENT_SECRET

## Storage — AWS S3 (keys provided via terrakube-credentials secret)
storage:
  defaultStorage: false
  aws:
    bucketName: "terrakube-code4-state"
    region: "eu-west-1"

api:
  defaultDatabase: true
  defaultRedis: true
  loadSampleData: false
  secrets:
    - terrakube-api-secrets
    - terrakube-credentials
  resources:
    requests:
      cpu: 200m
      memory: 1500Mi
    limits:
      cpu: 1000m
      memory: 1500Mi

executor:
  enabled: true
  secrets:
    - terrakube-executor-secrets
    - terrakube-credentials
  properties:
    toolsRepository: "https://github.com/terrakube-io/terrakube-extensions"
    toolsBranch: "main"
  resources:
    requests:
      cpu: 200m
      memory: 1024Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

registry:
  enabled: false

ui:
  enabled: true
  replicaCount: "1"
  serviceType: ClusterIP
  resources:
    requests:
      memory: 10Mi
    limits:
      memory: 100Mi

ingress:
  useTls: true
  includeTlsHosts: true
  controller: "generic"

  ui:
    domain: "terrakube.serval-mark.ts.net"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "tailscale"

  api:
    domain: "terrakube-api.serval-mark.ts.net"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "tailscale"
    useTls: true
    tlsSecretName: tls-secret-api-terrakube
    annotations:
      tailscale.com/experimental-forward-cluster-traffic-via-ingress: "true"

  dex:
    path: "/dex/"
    pathType: "Prefix"
    ingressClassName: "tailscale"

  registry:
    enabled: false

  executor:
    enabled: false
