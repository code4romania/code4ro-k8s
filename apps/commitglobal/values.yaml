fullnameOverride: commitglobal

image:
  repository: code4romania/website-factory
  tag: 1.11.8

ingress:
  enabled: true
  annotations:
    "cert-manager.io/cluster-issuer": letsencrypt
    "nginx.ingress.kubernetes.io/from-to-www-redirect": "true"
  hosts:
    - host: commitglobal.org
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: web-ssl
      hosts:
        - commitglobal.org
        - www.commitglobal.org

resources:
  requests:
    cpu: 10m
    memory: 80Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  - name: WEBSITE_FACTORY_EDITION
    value: "ong"
  - name: APP_URL
    value: "https://commitglobal.org"
  - name: APP_KEY
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: APP_KEY
  - name: DB_HOST
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: DB_HOST
  - name: DB_DATABASE
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: DB_DATABASE
  - name: DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: DB_USERNAME
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: DB_PASSWORD
  - name: MAIL_FROM_ADDRESS
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: MAIL_FROM_ADDRESS
  - name: FILESYSTEM_DRIVER
    value: "s3"
  - name: FILESYSTEM_CLOUD
    value: "s3"
  - name: AWS_URL
    value: "https://drh0w2fvom4pj.cloudfront.net"
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: AWS_ACCESS_KEY_ID
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: AWS_SECRET_ACCESS_KEY
  - name: AWS_DEFAULT_REGION
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: AWS_DEFAULT_REGION
  - name: AWS_BUCKET
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: AWS_BUCKET
  - name: SENTRY_LARAVEL_DSN
    valueFrom:
      secretKeyRef:
        name: commitglobal-secret
        key: SENTRY_LARAVEL_DSN
  - name: SENTRY_ENVIRONMENT
    value: "commitglobal.org"
